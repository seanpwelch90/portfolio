<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sean Welch | Software Engineer</title>
    <script>
      (function() {
        const accentColors = [
          ['#22d3ee', '#8b5cf6', '#ec4899'], // cyan -> purple -> pink
          ['#34d399', '#06b6d4', '#0891b2'], // emerald -> cyan
          ['#f472b6', '#a78bfa', '#818cf8'],  // pink -> violet -> indigo
          ['#fbbf24', '#f97316', '#ef4444'], // amber -> orange -> red
          ['#60a5fa', '#3b82f6', '#8b5cf6'], // blue -> indigo -> purple
          ['#4ade80', '#22c55e', '#14b8a6'], // green -> emerald -> teal
          ['#f472b6', '#ec4899', '#fb7185'], // rose tones
          ['#a78bfa', '#7c3aed', '#6366f1'], // violet -> purple -> indigo
        ];
        const random = accentColors[Math.floor(Math.random() * accentColors.length)];
        document.documentElement.style.setProperty('--accent-1', random[0]);
        document.documentElement.style.setProperty('--accent-2', random[1]);
        document.documentElement.style.setProperty('--accent-3', random[2]);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
